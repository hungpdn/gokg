version: 2

project_name: gokg

dist: dist

builds:
  - id: gokg
    main: ./cmd/gokg
    binary: gokg
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w -buildid=
        -X github.com/hungpdn/gokg/internal/version.Version={{ .Version }}
        -X github.com/hungpdn/gokg/internal/version.Commit={{ .Commit }}
        -X github.com/hungpdn/gokg/internal/version.Date={{ .Date }}

archives:
  - id: release-archives
    ids:
      - gokg
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - docs/*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

homebrew_casks:
  - name: gokg
    ids:
      - release-archives
    binaries:
      - gokg
    repository:
      owner: hungpdn
      name: homebrew-tap
      branch: main
      token: "{{ .Env.PUBLISH_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/hungpdn/gokg"
    description: "Go-native knowledge graph and MCP server for Go codebases"
    commit_msg_template: "chore(homebrew): update {{ .ProjectName }} to {{ .Tag }}"

scoops:
  - name: gokg
    repository:
      owner: hungpdn
      name: scoop-bucket
      branch: main
      token: "{{ .Env.PUBLISH_GITHUB_TOKEN }}"
    homepage: "https://github.com/hungpdn/gokg"
    description: "Go-native knowledge graph and MCP server for Go codebases"
    license: MIT
    commit_msg_template: "chore(scoop): update {{ .ProjectName }} to {{ .Tag }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
