name: Bug report
description: Report a reproducible problem in GoKG.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make GoKG more reliable. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of GoKG is affected?
      options:
        - Parser / graph extraction
        - Cypher query engine
        - MCP stdio server
        - MCP HTTP server
        - Workspace support
        - File watcher
        - BadgerDB storage
        - Release / install
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, repository shape, or a minimal code sample that triggers the bug.
      placeholder: |
        1. Run `gokg analyze --rebuild`
        2. Run `gokg query '...'`
        3. See error
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or error
      description: Paste relevant output, stack traces, or logs.
      render: text
  - type: textarea
    id: version
    attributes:
      label: GoKG version
      description: Paste `gokg version --json`.
      render: json
      placeholder: |
        {
          "version": "v0.1.0-alpha.4",
          "commit": "abc123",
          "date": "2026-06-26T00:00:00Z",
          "go_version": "go1.25.12",
          "platform": "darwin/amd64"
        }
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      description: How was GoKG installed or built?
      options:
        - go install
        - Homebrew
        - Scoop
        - GitHub Release archive
        - Built from source
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Go and OS details
      description: Paste `go version`, OS details, and any relevant `go env` output such as `GOMOD`, `GOWORK`, `GOPATH`, or `GOBIN`.
      render: text
      placeholder: |
        go version go1.25.12 darwin/amd64
        macOS 15.x
        GOMOD=/path/to/go.mod
        GOWORK=
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues first.
          required: true
        - label: This is not a security vulnerability.
          required: true
