name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why it matters
      description: Who benefits from this, and what decision or workflow gets easier?
      placeholder: |
        This helps AI coding agents answer impact-analysis questions across Go services without manually reading every package.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like GoKG to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, tools, or workarounds you have tried.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser / graph extraction
        - Cypher query engine
        - MCP server
        - CLI UX
        - Workspace support
        - File watcher
        - BadgerDB storage
        - Export formats
        - Release / install
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues first.
          required: true
